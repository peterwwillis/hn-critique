name: Crawl HN and Deploy

# ─── Triggers ────────────────────────────────────────────────────────────────
# • schedule / workflow_dispatch  → full production run (30 stories, deploy)
# • workflow_run (Test succeeded) → smoke-test run on PRs (1 story, no deploy, screenshot)
#
# The PR smoke-test only runs when the Test workflow completes successfully,
# ensuring the crawl pipeline is not exercised with broken code.
on:
  schedule:
    # Run at the top of every 2 hours.
    - cron: '0 */2 * * *'
  # Allow manual runs from the Actions tab with an optional provider override.
  workflow_dispatch:
    inputs:
      provider:
        description: 'AI provider to use (openai, github). Overrides config file.'
        required: false
        default: ''
  # Run the PR smoke-test only after the Test workflow has completed
  # successfully, so the crawl pipeline is not exercised with broken code.
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write
  # Required for the GitHub Models provider (GITHUB_TOKEN auth).
  models: read
  packages: read

jobs:
  crawl-and-deploy:
    # When triggered by workflow_run (PR smoke-test): only proceed if tests
    # passed, and only for PRs from the same repository (not forks), to avoid
    # executing untrusted code with privileged workflow_run permissions.
    if: |
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # When triggered by workflow_run, check out the PR's head commit.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build crawler binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -o ./bin/crawler ./cmd/crawler/

      # Skip cache restoration on PRs — the smoke test runs from a clean slate
      # so results are not influenced by cached data from a previous production run.
      - name: Restore analysis cache from gh-pages
        if: github.event_name != 'workflow_run' || github.event.workflow_run.event != 'pull_request'
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          mkdir -p docs/cache
          git archive origin/gh-pages -- cache/ 2>/dev/null | tar -x -C docs/ || true

      - name: Prepare story inputs (no AI)
        run: |
          ARGS=""
          if [ -n "${{ inputs.provider }}" ]; then
            ARGS="-provider ${{ inputs.provider }}"
          fi
          # PR smoke-test: fetch only one story to keep the run fast.
          # Production runs use the default story count (30).
          if [ "${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' }}" = "true" ]; then
            ARGS="$ARGS -stories 1"
          fi
          ./bin/crawler $ARGS -prepare-input -out ./docs

      - name: Read Playwright image tag
        run: echo "PLAYWRIGHT_VERSION=$(tr -d '\r\n' < docker/playwright/version.txt)" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        # GHCR packages are private by default unless explicitly set to public.
        if: github.event_name != 'workflow_run' || github.event.workflow_run.event != 'pull_request' || github.event.workflow_run.head_repository.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AI analysis in isolated container
        env:
          # GitHub Models provider: GITHUB_TOKEN is automatically available in
          # Actions and granted models:read by the permissions block above.
          # Enable GitHub Models in your repository: Settings → Copilot → Use GitHub Models.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OpenAI provider credentials (optional).
          # Set OPENAI_API_KEY secret to use api.openai.com.
          # Set OPENAI_BASE_URL variable to target a different OpenAI-compatible
          # server (e.g. a self-hosted Ollama instance on a private runner).
          # Set OPENAI_CHAT_MODEL variable to override the default model name.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
        run: |
          PROVIDER="${{ inputs.provider }}"
          if [ -z "$PROVIDER" ]; then
            PROVIDER="github"
          fi
          # In PR smoke-test mode, treat any analysis warning as a hard failure
          # so that broken pipeline changes are caught before merging to main.
          STRICT=""
          if [ "${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' }}" = "true" ]; then
            STRICT="-strict"
          fi
          ./bin/crawler -provider "$PROVIDER" $STRICT -analyze-input -out ./docs

      # ── PR-only steps: screenshot & artifact upload ───────────────────────
      # These steps are skipped on scheduled/manual runs.  On PRs they capture
      # a visual snapshot of the generated site so reviewers can confirm the
      # output looks correct before merging.

      - name: Screenshot generated site
        if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository
        run: |
          # Serve the generated docs directory on a local port.
          python3 -m http.server 8080 --directory docs &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT
          # Wait for the server to start responding (15 attempts × 1s).
          for attempt in $(seq 1 15); do
            if curl -fsS --max-time 2 http://localhost:8080/ >/dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS --max-time 2 http://localhost:8080/ >/dev/null; then
            echo "Timed out waiting for preview server to start." >&2
            exit 1
          fi

          PLAYWRIGHT_IMAGE="ghcr.io/${{ github.repository }}/playwright:${PLAYWRIGHT_VERSION}"
          if ! docker pull "$PLAYWRIGHT_IMAGE"; then
            echo "Failed to pull Playwright image ${PLAYWRIGHT_IMAGE}. Ensure the 'Build Playwright container' workflow has completed successfully and the image is available in GHCR." >&2
            exit 1
          fi

          screenshot_page() {
            local url="$1"
            local output="$2"
            if ! curl -fsS --max-time 2 "$url" >/dev/null; then
              echo "Failed to reach ${url} for screenshot (server may not be ready or page is missing)." >&2
              return 1
            fi
            docker run --rm --network host \
              -v "$PWD:/work" \
              -w /work \
              "$PLAYWRIGHT_IMAGE" \
              npx playwright screenshot --browser chromium --full-page \
              "$url" "$output"
          }

          # Screenshot the front page (story listing).
          screenshot_page "http://localhost:8080/" "pr-preview-index.png"

          # Screenshot the first critique page, if one was generated.
          CRITIQUE=$(find docs/critique -name '*.html' 2>/dev/null | sort | head -1)
          if [ -n "$CRITIQUE" ]; then
            REL="${CRITIQUE#docs/}"
            screenshot_page "http://localhost:8080/${REL}" "pr-preview-critique.png"
          fi

          # Screenshot the first comments page, if one was generated.
          COMMENTS=$(find docs/comments -name '*.html' 2>/dev/null | sort | head -1)
          if [ -n "$COMMENTS" ]; then
            REL="${COMMENTS#docs/}"
            screenshot_page "http://localhost:8080/${REL}" "pr-preview-comments.png"
          fi

      - name: Upload PR preview screenshots
        if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-screenshots
          path: pr-preview-*.png
          if-no-files-found: warn

      # ── Production deploy (skipped for PRs) ──────────────────────────────
      - name: Deploy to GitHub Pages
        if: github.event_name != 'workflow_run' || github.event.workflow_run.event != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          allow_empty_commit: false
          commit_message: 'chore: update HN Critique site [${{ github.run_number }}]'
