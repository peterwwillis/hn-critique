name: Build Playwright container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'docker/playwright/Dockerfile'
      - '.github/workflows/playwright-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Playwright image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/playwright/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/playwright:latest
            ghcr.io/${{ github.repository }}/playwright:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
