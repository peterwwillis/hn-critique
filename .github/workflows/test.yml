name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # ────────────────────────────────────────────────────────────
  # Unit tests — fast, no external services required.
  # ────────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-slim
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Static analysis (go vet)
        run: make vet

      - name: Unit tests
        run: make test-unit

  # ────────────────────────────────────────────────────────────
  # Integration tests — requires network access.
  # Tests the HN API client, article fetcher, and the full
  # HN -> article -> site-generator pipeline (no AI).
  # ────────────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-slim
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Integration tests
        run: make test-integration

  # ────────────────────────────────────────────────────────────
  # AI integration tests — calls the GitHub Models inference API
  # using the automatically-provided GITHUB_TOKEN.
  #
  # The job requires `permissions: models: read` so the token is
  # granted access to the inference endpoint.
  #
  # To enable this job in your repository:
  #   1. Go to Settings > Copilot > "Use GitHub Models" and enable it.
  #   2. The `permissions: models: read` block below is already set.
  #
  # The TestAI_GitHubModels test will FAIL (not silently skip) when
  # GITHUB_TOKEN is present but the API call fails, so you can see
  # exactly what went wrong in the logs.
  # ────────────────────────────────────────────────────────────
  ai:
    name: AI integration tests (GitHub Models)
    runs-on: ubuntu-slim
    continue-on-error: true
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: AI integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make test-ai

  screenshot:
    name: Capture UI screenshot
    if: github.event_name == 'pull_request'
    needs: [unit, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate docs for screenshot
        run: go run ./cmd/crawler/ -skip-ai -stories 1 -out ./docs

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture screenshot
        run: |
          mkdir -p artifacts
          if [ ! -s docker/playwright/version.txt ]; then
            echo "docker/playwright/version.txt is missing or empty. This file is required to determine the Playwright Docker image version." >&2
            exit 1
          fi
          PLAYWRIGHT_VERSION=$(tr -d '\r\n' < docker/playwright/version.txt)
          PLAYWRIGHT_IMAGE="ghcr.io/${{ github.repository }}/playwright:${PLAYWRIGHT_VERSION}"
          if ! docker pull "$PLAYWRIGHT_IMAGE"; then
            echo "Failed to pull Playwright image ${PLAYWRIGHT_IMAGE}. Ensure the Build Playwright container workflow has completed successfully and the image is available in GHCR." >&2
            exit 1
          fi

          python3 -m http.server 8080 --directory docs &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT

          for attempt in $(seq 1 15); do
            if curl -fsS --max-time 2 http://localhost:8080/ >/dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -fsS --max-time 2 http://localhost:8080/ >/dev/null; then
            echo "Timed out waiting for preview server to start." >&2
            exit 1
          fi

          docker run --rm --network host \
            -v "$PWD:/work" \
            -w /work \
            "$PLAYWRIGHT_IMAGE" \
            npx playwright screenshot --browser chromium --full-page \
            "http://localhost:8080/" "artifacts/hn-critique-ui.png"

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshot
          path: artifacts/hn-critique-ui.png
          retention-days: 7

      - name: Publish screenshot to branch
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cp artifacts/hn-critique-ui.png /tmp/hn-critique-ui.png
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin ui-screenshots || true
          if git show-ref --quiet refs/remotes/origin/ui-screenshots; then
            git switch ui-screenshots
            git reset --hard origin/ui-screenshots
          else
            git switch --orphan ui-screenshots
            git rm -rf . || true
          fi

          mkdir -p "pr-${PR_NUMBER}"
          cp /tmp/hn-critique-ui.png "pr-${PR_NUMBER}/hn-critique-ui.png"
          git add "pr-${PR_NUMBER}/hn-critique-ui.png"

          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Add UI screenshot for PR #${PR_NUMBER}"
            git push origin ui-screenshots
          fi

      - name: Comment PR with screenshot
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: hn-critique-ui
          message: |
            ### UI Screenshot
            ![hn-critique UI](https://raw.githubusercontent.com/${{ github.repository }}/ui-screenshots/pr-${{ github.event.pull_request.number }}/hn-critique-ui.png)
