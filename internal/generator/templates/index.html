<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HN Critique — Top Stories</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<center>
<table id="hnmain" border="0" cellpadding="0" cellspacing="0" width="85%" bgcolor="#f6f6ef">
  <tr><td bgcolor="#ff6600">{{template "header" .}}</td></tr>
  <tr style="height:10px"><td></td></tr>
  <tr><td>
    <table border="0" cellpadding="0" cellspacing="0" class="itemlist">
{{range .Stories}}
      <tr class="athing submission" id="{{.ID}}">
        <td align="right" valign="top" class="title"><span class="rank">{{.Rank}}.</span></td>
        <td valign="top" class="votelinks"></td>
        <td class="title">
          <span class="titleline">
            {{if .URL}}<a href="{{.URL}}" rel="noreferrer noopener">{{.Title}}</a>{{else}}<a href="https://news.ycombinator.com/item?id={{.ID}}">{{.Title}}</a>{{end}}
            {{if .Domain}}<span class="sitebit comhead"> (<span class="sitestr">{{.Domain}}</span>)</span>{{end}}
          </span>
        </td>
      </tr>
      <tr>
        <td colspan="2"></td>
        <td class="subtext">
          <span class="subline">
            <span class="score">{{.Score}} points</span>
            by <a href="https://news.ycombinator.com/user?id={{.Author}}" class="hnuser">{{.Author}}</a>
            <span class="age"><a href="https://news.ycombinator.com/item?id={{.ID}}">{{ago .Time}}</a></span>
            &nbsp;|&nbsp;<a href="https://news.ycombinator.com/item?id={{.ID}}" rel="noopener">original</a>
            &nbsp;|&nbsp;<a href="comments/{{.ID}}.html">{{.CommentCount}}&nbsp;comments</a>
            &nbsp;|&nbsp;<a href="critique/{{.ID}}.html" class="critique-btn">critique</a>
          </span>
        </td>
      </tr>
      <tr class="spacer" style="height:5px"><td colspan="3"></td></tr>
{{end}}
    </table>
  </td></tr>
  <tr><td>{{template "footer" .}}</td></tr>
</table>
</center>
</body>
</html>
